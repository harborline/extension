name: typecheck

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    # Scaffolding gate (PDX-124): we run `tsc --noEmit` on every PR/push to
    # publish typecheck status, but the job is non-blocking until a follow-up
    # flips `continue-on-error: false`. This gives downstream branches a
    # window to clean up any drift introduced before the gate landed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      # --ignore-scripts skips Plasmo's post-install hooks; the typecheck
      # only needs the TS toolchain + types, not the built extension.
      #
      # NOTE (PDX-124): --no-frozen-lockfile temporarily set so pnpm can
      # bring pnpm-lock.yaml into sync with the new `@types/node` devDep.
      # A follow-up PR will commit the regenerated lockfile and restore
      # --frozen-lockfile.
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - run: pnpm typecheck
